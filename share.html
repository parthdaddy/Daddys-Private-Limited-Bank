<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Market</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #fdf6e3;
    display: flex;
    justify-content: center;
    padding-top: 30px;
    margin: 0;
}
.container {
    background-color: #fff;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
    width: 600px;
    text-align: center;
}
h2, h3 {
    color: #333;
}
.share-price, .balance, .owned {
    font-size: 18px;
    margin: 10px 0;
}
.share-price span, .balance span, .owned span {
    font-weight: bold;
}
.buy-button, .sell-button {
    margin: 5px 5px 5px 0;
    padding: 6px 12px;
    font-size: 14px;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
.buy-button { background-color: #4CAF50; }
.buy-button:hover { background-color: #45a049; }
.sell-button { background-color: #f44336; }
.sell-button:hover { background-color: #e53935; }
.back-button {
    margin-top: 30px;
    padding: 10px 15px;
    font-size: 16px;
    background-color: #1976d2;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
.back-button:hover { background-color: #1565c0; }
</style>
</head>
<body>
<div class="container">
    <h2>Share Market Simulator</h2>
    <div class="balance">Current Balance: ₹<span id="currentBalance">0</span></div>

    <h3>Available Shares</h3>

    <div class="share-price">
        Black Clit: ₹<span id="shareA">0</span>
        <button class="buy-button" onclick="buyShare('A')">Buy</button>
        <button class="sell-button" onclick="sellShare('A')">Sell</button>
        <div class="owned">Owned: <span id="ownedA">0</span></div>
    </div>

    <div class="share-price">
        Pink Pussy: ₹<span id="shareB">0</span>
        <button class="buy-button" onclick="buyShare('B')">Buy</button>
        <button class="sell-button" onclick="sellShare('B')">Sell</button>
        <div class="owned">Owned: <span id="ownedB">0</span></div>
    </div>

    <div class="share-price">
        Golden Dick: ₹<span id="shareC">0</span>
        <button class="buy-button" onclick="buyShare('C')">Buy</button>
        <button class="sell-button" onclick="sellShare('C')">Sell</button>
        <div class="owned">Owned: <span id="ownedC">0</span></div>
    </div>

    <button class="back-button" onclick="goBack()">Back to Dashboard</button>
</div>

<script>
// Get username from URL
const params = new URLSearchParams(window.location.search);
const username = params.get("user");
if(!username) window.location.href = "login.html";

// Load balance from localStorage
let currentBalance = parseFloat(localStorage.getItem("currentBalance"));
if(isNaN(currentBalance)) currentBalance = 0;
document.getElementById("currentBalance").textContent = currentBalance.toFixed(2);

// Admin-defined max price for each share
const adminMaxPrice = {
    A: 1500,
    B: 2500,
    C: 3000
};

// Share initial random prices
let sharePrices = {
    A: randomPrice(100, adminMaxPrice.A * 0.8),
    B: randomPrice(1500, adminMaxPrice.B * 0.8),
    C: randomPrice(2000, adminMaxPrice.C * 0.8)
};

// Track initial buying price (used for max 5% hike later if needed)
let initialBuyingPrice = { ...sharePrices };

// Owned shares
let ownedShares = { A: 0, B: 0, C: 0 };

// Generate random price
function randomPrice(min, max){
    return parseFloat((Math.random() * (max - min) + min).toFixed(2));
}

// Update share prices every second, rarely reaching max
function updateShares(){
    for(let share in sharePrices){
        const min = 0;
        const max = adminMaxPrice[share];
        // Most of the time small fluctuation, occasionally spike to max
        const spikeChance = Math.random();
        let changePercent;
        if(spikeChance > 0.95) changePercent = (Math.random() * 0.05); // rare spike up to 5%
        else changePercent = (Math.random()*2 - 1)/100; // -1% to +1% normally

        let newPrice = sharePrices[share] * (1 + changePercent);
        newPrice = Math.max(min, Math.min(max, newPrice));
        sharePrices[share] = newPrice.toFixed(2);
        document.getElementById("share"+share).textContent = sharePrices[share];
    }
}

// Buy share
function buyShare(share){
    const price = parseFloat(sharePrices[share]);
    if(price > adminMaxPrice[share]){
        alert(`Cannot buy! Price exceeds admin-set max ₹${adminMaxPrice[share]}`);
        return;
    }
    if(currentBalance >= price){
        currentBalance -= price;
        ownedShares[share]++;
        updateUI(share);
    } else alert("Insufficient balance!");
}

// Sell share
function sellShare(share){
    if(ownedShares[share] > 0){
        const price = parseFloat(sharePrices[share]);
        currentBalance += price;
        ownedShares[share]--;
        updateUI(share);
    } else alert("No shares to sell!");
}

// Update UI
function updateUI(share){
    document.getElementById("currentBalance").textContent = currentBalance.toFixed(2);
    document.getElementById("owned"+share).textContent = ownedShares[share];
    localStorage.setItem("currentBalance", currentBalance);
}

// Start price updates
setInterval(updateShares, 1000);
updateShares();

// Back button
function goBack(){
    window.location.href = "welcome.html?user=" + encodeURIComponent(username);
}
</script>
</body>
</html>
