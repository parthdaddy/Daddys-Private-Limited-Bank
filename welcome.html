<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Page</title>

<style>
body{
font-family: Arial, sans-serif;
background:#e0f7fa;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:50px;
margin:0;
}

.welcome-container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
width:420px;
text-align:center;
}

.balance{
font-size:18px;
margin:12px 0;
}

.balance span{
font-weight:bold;
}

.admin-panel{
margin-top:20px;
display:none;
}

.admin-panel input{
width:90%;
padding:10px;
margin:5px 0;
}

.admin-panel button{
padding:10px 15px;
margin-top:10px;
}

.share-button{
margin-top:20px;
padding:12px 20px;
background:#1976d2;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.share-button:hover{
background:#1565c0;
}

.logout-button{
margin-top:15px;
padding:10px 18px;
background:#e53935;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.logout-button:hover{
background:#c62828;
}
</style>

</head>

<body>

<div class="welcome-container">

<h2 id="welcomeMessage"></h2>

<div class="balance">
Current Balance: ₹<span id="currentBalance">0.00</span>
</div>

<div class="balance">
Withdrawable Balance: ₹<span id="withdrawableBalance">0.00</span>
</div>

<div class="admin-panel" id="adminPanel">

<h3>Admin Balance Control</h3>

<input type="text" id="setUsername" placeholder="Enter Username">

<input type="number" id="setCurrentBalance" placeholder="Set Current Balance">

<input type="number" id="setWithdrawBalance" placeholder="Set Withdrawable Balance">

<br>

<button onclick="saveBalance()">Update Balance</button>

</div>

<button class="share-button" onclick="goToShareMarket()">
Go to Share Market
</button>

<br>

<button class="logout-button" onclick="logout()">
Logout
</button>

</div>

<script>

/* READ USERNAME FROM URL */

const params = new URLSearchParams(window.location.search);
const username = params.get("user");

/* BLOCK DIRECT ACCESS */

if(!username){
alert("Please login first");
window.location.href = "login.html";
}

/* SHOW WELCOME */

document.getElementById("welcomeMessage").textContent =
"Welcome, " + username;

/* LOAD USER DATA SAFELY */

let userData;

try{
userData = JSON.parse(localStorage.getItem("userData_" + username));
}catch(e){
userData = null;
}

if(!userData){

userData = {
balance:3500,
withdrawableBalance:1300,
ownedShares:{A:0,B:0,C:0},
highestBoughtPrice:{A:0,B:0,C:0}
};

localStorage.setItem(
"userData_" + username,
JSON.stringify(userData)
);

}

/* UPDATE BALANCE UI */

function updateUI(){

document.getElementById("currentBalance").textContent =
Number(userData.balance || 0).toFixed(2);

document.getElementById("withdrawableBalance").textContent =
Number(userData.withdrawableBalance || 0).toFixed(2);

}

updateUI();

/* ADMIN PANEL */

if(username === "admin"){
document.getElementById("adminPanel").style.display = "block";
}

/* ADMIN UPDATE BALANCE */

function saveBalance(){

const targetUser =
document.getElementById("setUsername").value.trim();

if(!targetUser){
alert("Enter username");
return;
}

let targetData =
JSON.parse(localStorage.getItem("userData_" + targetUser));

if(!targetData){

targetData = {
balance:0,
withdrawableBalance:0,
ownedShares:{A:0,B:0,C:0},
highestBoughtPrice:{A:0,B:0,C:0}
};

}

const newCurrent =
document.getElementById("setCurrentBalance").value;

const newWithdraw =
document.getElementById("setWithdrawBalance").value;

if(newCurrent !== ""){
targetData.balance = Number(newCurrent);
}

if(newWithdraw !== ""){
targetData.withdrawableBalance = Number(newWithdraw);
}

localStorage.setItem(
"userData_" + targetUser,
JSON.stringify(targetData)
);

alert("Balance updated for " + targetUser);

/* CLEAR INPUTS */

document.getElementById("setUsername").value="";
document.getElementById("setCurrentBalance").value="";
document.getElementById("setWithdrawBalance").value="";

/* REFRESH IF CURRENT USER UPDATED */

if(targetUser === username){
userData = targetData;
updateUI();
}

}

/* SHARE MARKET PAGE */

function goToShareMarket(){

window.location.href =
"share.html?user=" + encodeURIComponent(username);

}

/* LOGOUT */

function logout(){
window.location.href = "login.html";
}

</script>

</body>
</html>
