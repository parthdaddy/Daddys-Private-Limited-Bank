<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.login-container {
    background-color: #fff;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
    width: 350px;
    text-align: center;
}

.login-container h2 {
    margin-bottom: 30px;
    color: #333;
}

.login-container input {
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
}

.login-container button {
    width: 100%;
    padding: 12px;
    background-color: #4CAF50;
    border: none;
    border-radius: 5px;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.login-container button:hover {
    background-color: #45a049;
}

.error {
    color: red;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-container">
<h2>Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="checkLogin()">Login</button>

<p class="error" id="errorMsg"></p>
</div>

<script>

// MASTER LOGIN
const MASTER_USERNAME = "admin";
const MASTER_PASSWORD = "admin@123";

// USER LIST
const users = {
    "sissyhast": "daddyparth"
};

function checkLogin(){

const usernameInput = document.getElementById("username").value.trim();
const passwordInput = document.getElementById("password").value.trim();
const errorMsg = document.getElementById("errorMsg");

errorMsg.textContent = "";

// MASTER LOGIN
if(usernameInput === MASTER_USERNAME && passwordInput === MASTER_PASSWORD){

    window.location.href = "welcome.html?user=" + encodeURIComponent(usernameInput);
    return;
}

// USER LOGIN
if(users[usernameInput] && users[usernameInput] === passwordInput){

    window.location.href = "welcome.html?user=" + encodeURIComponent(usernameInput);
    return;
}

// INVALID LOGIN
errorMsg.textContent = "Invalid username or password!";

}

</script>

</body>
</html>
